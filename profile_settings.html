{% extends 'base.html' %}
{% block title %}Profile Settings — TechBlog{% endblock %}
{% block content %}
<div class="form-page">
  <h2>Profile Settings</h2>
  <form method="POST" class="post-form">
    <div class="form-group">
      <label>Avatar URL</label>
      <input type="url" name="avatar_url" value="{{ user.avatar_url or '' }}" placeholder="https://example.com/your-photo.jpg">
      <small>Paste a link to an image hosted elsewhere (e.g. GitHub avatar, Gravatar).</small>
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea name="bio" rows="4" placeholder="Tell readers about yourself...">{{ user.bio or '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Social Links</label>
      <input type="text" name="social_links" value="{{ user.social_links or '' }}" placeholder="GitHub: github.com/you | Twitter: @you">
      <small>Free text — shown as-is on your author profile.</small>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
